<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 320">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }

  text {
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }
</style>

<rect width="680" height="320" fill="var(--bg)"/>

<text x="170" y="34" text-anchor="middle" font-size="11" fill="var(--fg)">accepted phase</text>
<text x="510" y="34" text-anchor="middle" font-size="11" fill="var(--fg)">rejected phase</text>

<rect x="52" y="58" width="236" height="92" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="170" y="80" text-anchor="middle" font-size="10.5" fill="var(--fg)">NS_STRAIGHT</text>
<text x="170" y="108" text-anchor="middle" font-size="9" fill="var(--fg2)">NORTH -> SOUTH</text>
<text x="170" y="128" text-anchor="middle" font-size="9" fill="var(--fg2)">SOUTH -> NORTH</text>

<rect x="392" y="58" width="236" height="92" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="510" y="80" text-anchor="middle" font-size="10.5" fill="var(--fg)">CROSSING_STRAIGHT</text>
<text x="510" y="108" text-anchor="middle" font-size="9" fill="var(--fg2)">NORTH -> SOUTH</text>
<text x="510" y="128" text-anchor="middle" font-size="9" fill="var(--fg2)">EAST -> WEST</text>

<rect x="52" y="184" width="236" height="72" rx="3" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="170" y="205" text-anchor="middle" font-size="10" fill="var(--fg)">allowed</text>
<text x="170" y="229" text-anchor="middle" font-size="8.7" fill="var(--fg3)">same axis, opposite approaches</text>
<text x="170" y="247" text-anchor="middle" font-size="8.7" fill="var(--fg3)">no crossing paths</text>

<rect x="392" y="184" width="236" height="72" rx="3" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="510" y="205" text-anchor="middle" font-size="10" fill="var(--fg)">rejected</text>
<text x="510" y="229" text-anchor="middle" font-size="8.7" fill="var(--fg3)">different axes</text>
<text x="510" y="247" text-anchor="middle" font-size="8.7" fill="var(--fg3)">crossing movements</text>

<rect x="262" y="272" width="156" height="32" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="288" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">ConflictMatrix</text>

<line x1="170" y1="150" x2="170" y2="184" stroke="var(--line)" stroke-width="0.7"/>
<line x1="510" y1="150" x2="510" y2="184" stroke="var(--line)" stroke-width="0.7"/>

<path d="M262 288 H170 V256" fill="none" stroke="var(--line)" stroke-width="0.7"/>
<path d="M418 288 H510 V256" fill="none" stroke="var(--line)" stroke-width="0.7"/>
</svg>
