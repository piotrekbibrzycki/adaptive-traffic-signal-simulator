<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 320">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }

  text {
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }
</style>

<rect width="680" height="320" fill="var(--bg)"/>

<rect x="286" y="38" width="108" height="244" rx="3" fill="none" stroke="var(--line)" stroke-width="0.7"/>
<rect x="96" y="106" width="488" height="108" rx="3" fill="none" stroke="var(--line)" stroke-width="0.7"/>
<rect x="286" y="106" width="108" height="108" fill="var(--bg)" stroke="var(--line)" stroke-width="0.7"/>

<text x="340" y="24" text-anchor="middle" font-size="11" fill="var(--fg)">north</text>
<text x="340" y="302" text-anchor="middle" font-size="11" fill="var(--fg)">south</text>
<text x="70" y="164" text-anchor="middle" font-size="11" fill="var(--fg)">west</text>
<text x="610" y="164" text-anchor="middle" font-size="11" fill="var(--fg)">east</text>

<line x1="322" y1="38" x2="322" y2="106" stroke="var(--line)" stroke-width="0.7"/>
<line x1="358" y1="38" x2="358" y2="106" stroke="var(--line)" stroke-width="0.7"/>
<text x="304" y="58" text-anchor="middle" font-size="8.5" fill="var(--fg3)">R</text>
<text x="340" y="58" text-anchor="middle" font-size="8.5" fill="var(--fg3)">S</text>
<text x="376" y="58" text-anchor="middle" font-size="8.5" fill="var(--fg3)">L</text>

<line x1="322" y1="214" x2="322" y2="282" stroke="var(--line)" stroke-width="0.7"/>
<line x1="358" y1="214" x2="358" y2="282" stroke="var(--line)" stroke-width="0.7"/>
<text x="304" y="266" text-anchor="middle" font-size="8.5" fill="var(--fg3)">L</text>
<text x="340" y="266" text-anchor="middle" font-size="8.5" fill="var(--fg3)">S</text>
<text x="376" y="266" text-anchor="middle" font-size="8.5" fill="var(--fg3)">R</text>

<line x1="96" y1="142" x2="286" y2="142" stroke="var(--line)" stroke-width="0.7"/>
<line x1="96" y1="178" x2="286" y2="178" stroke="var(--line)" stroke-width="0.7"/>
<text x="120" y="128" text-anchor="middle" font-size="8.5" fill="var(--fg3)">L</text>
<text x="120" y="164" text-anchor="middle" font-size="8.5" fill="var(--fg3)">S</text>
<text x="120" y="200" text-anchor="middle" font-size="8.5" fill="var(--fg3)">R</text>

<line x1="394" y1="142" x2="584" y2="142" stroke="var(--line)" stroke-width="0.7"/>
<line x1="394" y1="178" x2="584" y2="178" stroke="var(--line)" stroke-width="0.7"/>
<text x="560" y="128" text-anchor="middle" font-size="8.5" fill="var(--fg3)">R</text>
<text x="560" y="164" text-anchor="middle" font-size="8.5" fill="var(--fg3)">S</text>
<text x="560" y="200" text-anchor="middle" font-size="8.5" fill="var(--fg3)">L</text>

<rect x="76" y="244" width="150" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="151" y="260" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">FIFO per lane</text>
<text x="151" y="276" text-anchor="middle" dominant-baseline="central" font-size="8.5" fill="var(--fg3)">[vehicle1, vehicle2]</text>

<rect x="454" y="244" width="150" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="529" y="260" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">movement</text>
<text x="529" y="276" text-anchor="middle" dominant-baseline="central" font-size="8.5" fill="var(--fg3)">startRoad -> endRoad</text>

<text x="340" y="163" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">intersection</text>
</svg>
